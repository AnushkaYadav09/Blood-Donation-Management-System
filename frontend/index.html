<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c41e3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BloodConnect" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />

    <!-- SEO -->
    <meta name="description" content="Connect blood donors with nearby blood banks. Register, check eligibility, and save lives with BloodConnect." />
    <meta name="keywords" content="blood donation, blood bank, donor, India, health" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="BloodConnect - Blood Donation Management" />
    <meta property="og:description" content="Find nearby blood banks, check eligibility, and donate blood to save lives." />
    <meta property="og:type" content="website" />

    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>BloodConnect - Blood Donation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
